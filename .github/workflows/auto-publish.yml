# =============================================================================
# SarkariDarapan — Daily Scrape & Publish Pipeline
# Runs scraper.py then generate_articles.py every day at 6 AM IST (00:30 UTC)
# =============================================================================

name: Daily Scrape & Publish

on:
  schedule:
    # 6:00 AM IST = 00:30 UTC
    - cron: "30 0 * * *"
  workflow_dispatch: # Allow manual trigger from GitHub UI

permissions:
  issues: write

env:
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

jobs:
  scrape-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ── Setup ─────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      # ── Scrape ────────────────────────────────────────────────────────────
      - name: Run scraper
        id: scrape
        run: |
          echo "::group::Scraper output"
          python scripts/scraper.py 2>&1 | tee scraper.log
          echo "::endgroup::"

          # Parse counts from scraper log
          new_jobs=$(grep -oP 'Inserted \K\d+(?= new jobs)' scraper.log || echo "0")
          new_schemes=$(grep -oP 'Inserted \K\d+(?= new schemes)' scraper.log || echo "0")
          # If "Nothing new to insert" appeared instead
          if [ "$new_jobs" = "" ]; then new_jobs=0; fi
          if [ "$new_schemes" = "" ]; then new_schemes=0; fi

          echo "new_jobs=$new_jobs" >> "$GITHUB_OUTPUT"
          echo "new_schemes=$new_schemes" >> "$GITHUB_OUTPUT"
          echo "### Scraper Results" >> "$GITHUB_STEP_SUMMARY"
          echo "- New jobs scraped: **$new_jobs**" >> "$GITHUB_STEP_SUMMARY"
          echo "- New schemes scraped: **$new_schemes**" >> "$GITHUB_STEP_SUMMARY"

      # ── Generate Articles ─────────────────────────────────────────────────
      - name: Generate articles
        id: generate
        run: |
          echo "::group::Article generator output"
          python scripts/generate_articles.py 2>&1 | tee generator.log
          echo "::endgroup::"

          # Parse counts from generator log
          jobs_gen=$(grep -oP 'Jobs generated: \K\d+' generator.log || echo "0")
          jobs_fail=$(grep -oP 'failed: \K\d+' generator.log | head -1 || echo "0")
          schemes_gen=$(grep -oP 'Schemes generated: \K\d+' generator.log || echo "0")
          schemes_fail=$(grep -oP 'failed: \K\d+' generator.log | tail -1 || echo "0")
          if [ "$jobs_gen" = "" ]; then jobs_gen=0; fi
          if [ "$jobs_fail" = "" ]; then jobs_fail=0; fi
          if [ "$schemes_gen" = "" ]; then schemes_gen=0; fi
          if [ "$schemes_fail" = "" ]; then schemes_fail=0; fi

          echo "jobs_generated=$jobs_gen" >> "$GITHUB_OUTPUT"
          echo "jobs_failed=$jobs_fail" >> "$GITHUB_OUTPUT"
          echo "schemes_generated=$schemes_gen" >> "$GITHUB_OUTPUT"
          echo "schemes_failed=$schemes_fail" >> "$GITHUB_OUTPUT"
          echo "### Article Generator Results" >> "$GITHUB_STEP_SUMMARY"
          echo "- Jobs published: **$jobs_gen** (failed: $jobs_fail)" >> "$GITHUB_STEP_SUMMARY"
          echo "- Schemes published: **$schemes_gen** (failed: $schemes_fail)" >> "$GITHUB_STEP_SUMMARY"

      # ── Summary ───────────────────────────────────────────────────────────
      - name: Print summary
        if: always()
        run: |
          echo "============================================"
          echo " DAILY PIPELINE SUMMARY"
          echo "============================================"
          echo " Scraped:   ${{ steps.scrape.outputs.new_jobs }} jobs, ${{ steps.scrape.outputs.new_schemes }} schemes"
          echo " Published: ${{ steps.generate.outputs.jobs_generated }} jobs, ${{ steps.generate.outputs.schemes_generated }} schemes"
          echo " Failed:    ${{ steps.generate.outputs.jobs_failed }} jobs, ${{ steps.generate.outputs.schemes_failed }} schemes"
          echo "============================================"

      # ── Failure Notification ──────────────────────────────────────────────
      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const now = new Date().toISOString().slice(0, 10);
            const title = `Pipeline failed — ${now}`;

            // Check if an open issue with this title already exists
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'pipeline-failure',
              per_page: 5,
            });
            const dup = existing.data.find(i => i.title === title);
            if (dup) {
              core.info(`Issue already exists: #${dup.number}`);
              return;
            }

            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              labels: ['pipeline-failure'],
              body: [
                `## Daily Scrape & Publish pipeline failed`,
                ``,
                `**Run:** [${context.runId}](${runUrl})`,
                `**Triggered:** ${now}`,
                ``,
                `### Steps`,
                `| Step | Status |`,
                `|------|--------|`,
                `| Scraper | ${{ steps.scrape.outcome }} |`,
                `| Article Generator | ${{ steps.generate.outcome }} |`,
                ``,
                `Check the [workflow run logs](${runUrl}) for details.`,
              ].join('\n'),
            });
